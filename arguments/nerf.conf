# ================= Field & Deformation Configuration =================
select_field = static_dynamic_field

use_deformation = true

# ================= Static + Dynamic Hybrid Opacity Field =================
static_dynamic_field {
    hash3dgrid {
        otype = HashGrid
        n_levels = 12
        n_features_per_level = 2
        log2_hashmap_size = 19
        base_resolution = 8
        per_level_scale = 1.45
    }
    hash4dgrid {
        otype = HashGrid
        n_levels = 12
        n_features_per_level = 2
        log2_hashmap_size = 19
        base_resolution = 2
        per_level_scale = 1.4
    }
    net {
        otype = FullyFusedMLP
        activation = ReLU
        output_activation = ReLU
        n_neurons = 64
        n_hidden_layers = 2
    }
}

# ================= Deformation Module =================
deform_conf {
    n_control_nodes = 4096
    k_neighbors = 4

    hash4dgrid_deformation {
        otype = HashGrid
        n_levels = 8
        n_features_per_level = 2
        log2_hashmap_size = 19
        base_resolution = 16
        per_level_scale = 1.5
    }

    net_deformation {
        otype = FullyFusedMLP
        activation = ReLU
        output_activation = None
        n_neurons = 64
        n_hidden_layers = 2
    }
}

# Placeholders
identity_field {}
dynamic_field {}
